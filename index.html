<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>하늘 — 실시간 날씨</title>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --sky: #0f2240;
      --sky2: #1a3a6b;
      --sky3: #2e6bbd;
      --accent: #7ec8e3;
      --warm: #f4c97a;
      --cloud: rgba(255,255,255,0.08);
      --text: #e8f4ff;
      --muted: rgba(232,244,255,0.55);
      --card: rgba(255,255,255,0.06);
      --border: rgba(126,200,227,0.18);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      min-height: 100vh;
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--sky);
      color: var(--text);
      overflow-x: hidden;
    }

    /* 배경 하늘 애니메이션 */
    body::before {
      content:'';
      position:fixed; inset:0; z-index:0;
      background: radial-gradient(ellipse at 60% 0%, #2e6bbd55 0%, transparent 60%),
                  radial-gradient(ellipse at 10% 80%, #1a3a6b88 0%, transparent 50%),
                  linear-gradient(170deg, #0f2240 0%, #1a3a6b 50%, #0f2240 100%);
      animation: skyPulse 8s ease-in-out infinite alternate;
    }
    @keyframes skyPulse {
      0%   { background: radial-gradient(ellipse at 60% 0%, #2e6bbd55 0%, transparent 60%), linear-gradient(170deg, #0f2240 0%, #1a3a6b 50%, #0f2240 100%); }
      100% { background: radial-gradient(ellipse at 30% 10%, #3a82d255 0%, transparent 60%), linear-gradient(170deg, #121e36 0%, #1e4a80 50%, #121e36 100%); }
    }

    /* 별 반짝임 */
    .stars { position:fixed; inset:0; z-index:0; pointer-events:none; }
    .star {
      position:absolute; border-radius:50%;
      background:white; opacity:0;
      animation: twinkle var(--dur) ease-in-out infinite var(--delay);
    }
    @keyframes twinkle {
      0%,100%{opacity:0;transform:scale(0.5);}
      50%{opacity:var(--op);transform:scale(1);}
    }

    /* 레이아웃 */
    .container {
      position:relative; z-index:1;
      max-width:700px; margin:0 auto;
      padding: 40px 24px 60px;
    }

    /* 헤더 */
    header {
      text-align:center; margin-bottom:36px;
      animation: fadeDown 0.8s ease both;
    }
    .brand {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 2.8rem; font-weight:800;
      letter-spacing:0.08em;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color:transparent;
    }
    .tagline {
      font-size:0.8rem; color:var(--muted);
      letter-spacing:0.3em; text-transform:uppercase;
      margin-top:4px;
    }

    /* 검색창 */
    .search-wrap {
      display:flex; gap:8px; margin-bottom:36px;
      animation: fadeDown 0.8s 0.1s ease both;
    }
    .search-wrap input {
      flex:1; padding:14px 20px;
      background:var(--card); border:1px solid var(--border);
      border-radius:12px; color:var(--text);
      font-size:1rem; font-family:'Noto Sans KR',sans-serif;
      outline:none; transition:border 0.2s, background 0.2s;
      backdrop-filter:blur(10px);
    }
    .search-wrap input::placeholder { color:var(--muted); }
    .search-wrap input:focus {
      border-color:var(--accent);
      background:rgba(255,255,255,0.1);
    }
    .search-wrap button, .loc-btn {
      padding:14px 22px; border:none; border-radius:12px;
      cursor:pointer; font-size:0.95rem; font-weight:500;
      font-family:'Noto Sans KR',sans-serif;
      transition:all 0.2s;
    }
    .search-wrap button {
      background: linear-gradient(135deg, var(--accent), var(--sky3));
      color: #0f2240;
    }
    .search-wrap button:hover { opacity:0.85; transform:translateY(-1px); }
    .loc-btn {
      background:var(--card); border:1px solid var(--border);
      color:var(--text); backdrop-filter:blur(10px);
    }
    .loc-btn:hover { background:rgba(255,255,255,0.12); }

    /* 메인 날씨 카드 */
    .main-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:24px; padding:36px 32px;
      backdrop-filter:blur(20px);
      box-shadow:0 8px 40px rgba(0,0,0,0.3);
      margin-bottom:20px;
      animation: fadeUp 0.8s 0.2s ease both;
      display:none;
    }
    .main-card.show { display:block; }
    .location-name {
      font-size:1.05rem; color:var(--accent);
      letter-spacing:0.15em; text-transform:uppercase;
      margin-bottom:6px;
    }
    .weather-hero {
      display:flex; align-items:center;
      justify-content:space-between; flex-wrap:wrap; gap:16px;
      margin-bottom:28px;
    }
    .weather-icon-big { font-size:5rem; line-height:1; }
    .temp-main {
      font-family:'Nanum Myeongjo',serif;
      font-size:5.5rem; font-weight:800; line-height:1;
      background:linear-gradient(135deg,#fff 40%,var(--accent));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .weather-desc {
      font-size:1.1rem; color:var(--muted); margin-top:4px;
    }
    .update-time {
      font-size:0.72rem; color:var(--muted);
      letter-spacing:0.1em; margin-top:4px;
    }

    /* 디테일 그리드 */
    .detail-grid {
      display:grid; grid-template-columns:repeat(3,1fr); gap:12px;
    }
    .detail-item {
      background:rgba(255,255,255,0.04);
      border:1px solid var(--border); border-radius:14px;
      padding:16px 14px; text-align:center;
    }
    .detail-label {
      font-size:0.7rem; color:var(--muted);
      letter-spacing:0.15em; text-transform:uppercase;
      margin-bottom:6px;
    }
    .detail-value {
      font-size:1.3rem; font-weight:500; color:var(--text);
    }
    .detail-icon { font-size:1.2rem; margin-bottom:4px; }

    /* 예보 카드 */
    .forecast-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:20px; padding:24px 28px;
      backdrop-filter:blur(20px);
      box-shadow:0 4px 20px rgba(0,0,0,0.2);
      animation: fadeUp 0.8s 0.35s ease both;
      display:none;
    }
    .forecast-card.show { display:block; }
    .section-title {
      font-size:0.72rem; color:var(--accent);
      letter-spacing:0.25em; text-transform:uppercase;
      margin-bottom:16px;
    }
    .forecast-list { display:flex; flex-direction:column; gap:10px; }
    .forecast-item {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .forecast-item:last-child { border-bottom:none; }
    .forecast-time { font-size:0.85rem; color:var(--muted); width:60px; }
    .forecast-icon { font-size:1.4rem; }
    .forecast-desc { font-size:0.85rem; color:var(--muted); flex:1; padding:0 12px; }
    .forecast-temp { font-size:0.95rem; font-weight:500; }
    .forecast-rain { font-size:0.8rem; color:var(--accent); }

    /* 로딩 / 에러 */
    .status-box {
      text-align:center; padding:48px;
      animation: fadeUp 0.5s ease;
    }
    .spinner {
      width:40px; height:40px; border-radius:50%;
      border:3px solid var(--border);
      border-top-color:var(--accent);
      animation:spin 0.8s linear infinite;
      margin:0 auto 16px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .error-msg { color:#ff7b7b; font-size:0.9rem; }

    /* 초기 안내 */
    .intro-box {
      text-align:center; padding:60px 24px;
      animation:fadeUp 0.8s 0.3s ease both;
    }
    .intro-icon { font-size:4rem; margin-bottom:16px; }
    .intro-text { color:var(--muted); font-size:0.95rem; line-height:1.8; }

    /* 애니메이션 */
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-20px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* 반응형 */
    @media(max-width:480px) {
      .brand { font-size:2rem; }
      .temp-main { font-size:4rem; }
      .detail-grid { grid-template-columns:repeat(3,1fr); gap:8px; }
      .detail-value { font-size:1.1rem; }
    }
  </style>
</head>
<body>

<!-- 별 -->
<div class="stars" id="stars"></div>

<div class="container">
  <header>
    <div class="brand">하늘</div>
    <div class="tagline">실시간 날씨 서비스</div>
  </header>

  <div class="search-wrap">
    <input type="text" id="cityInput" placeholder="지역명 입력 (예: 서울, 전주, 부산)" />
    <button onclick="searchWeather()">검색</button>
    <button class="loc-btn" onclick="getMyLocation()" title="현재 위치">📍</button>
  </div>

  <div id="statusArea"></div>
  <div class="main-card" id="mainCard"></div>
  <div class="forecast-card" id="forecastCard"></div>

  <div class="intro-box" id="introBox">
    <div class="intro-icon">🌤️</div>
    <div class="intro-text">지역명을 입력하거나<br>📍 버튼으로 현재 위치의 날씨를 확인하세요</div>
  </div>
</div>

<script>
// ─── 인증키 ───────────────────────────────────────────────
const SERVICE_KEY = '3451736c028ee2308fc7b0fbd3d7c70cf80e9897315cc4dcc52ca892d1a9718d';
const BASE_URL = 'https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0';

// ─── 별 생성 ──────────────────────────────────────────────
(function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%; top:${Math.random()*60}%;
      --dur:${2+Math.random()*4}s;
      --delay:-${Math.random()*5}s;
      --op:${0.4+Math.random()*0.6};
    `;
    container.appendChild(s);
  }
})();

// ─── 도시 좌표 데이터 (격자 x, y) ────────────────────────
const CITIES = {
  '서울':   {nx:60,ny:127,name:'서울'},
  '부산':   {nx:98,ny:76, name:'부산'},
  '대구':   {nx:89,ny:90, name:'대구'},
  '인천':   {nx:55,ny:124,name:'인천'},
  '광주':   {nx:58,ny:74, name:'광주'},
  '대전':   {nx:67,ny:100,name:'대전'},
  '울산':   {nx:102,ny:84,name:'울산'},
  '세종':   {nx:66,ny:103,name:'세종'},
  '수원':   {nx:60,ny:121,name:'수원'},
  '전주':   {nx:63,ny:89, name:'전주'},
  '청주':   {nx:69,ny:107,name:'청주'},
  '춘천':   {nx:73,ny:134,name:'춘천'},
  '강릉':   {nx:92,ny:131,name:'강릉'},
  '창원':   {nx:90,ny:77, name:'창원'},
  '포항':   {nx:102,ny:94,name:'포항'},
  '제주':   {nx:52,ny:38, name:'제주'},
  '목포':   {nx:50,ny:67, name:'목포'},
  '여수':   {nx:73,ny:66, name:'여수'},
  '순천':   {nx:70,ny:70, name:'순천'},
  '천안':   {nx:63,ny:110,name:'천안'},
  '원주':   {nx:76,ny:122,name:'원주'},
  '안동':   {nx:91,ny:106,name:'안동'},
  '진주':   {nx:81,ny:75, name:'진주'},
  '군산':   {nx:56,ny:92, name:'군산'},
};

// ─── 날씨 아이콘/설명 ─────────────────────────────────────
function getSkyInfo(pty, sky) {
  if (pty === '1') return {icon:'🌧️', desc:'비'};
  if (pty === '2') return {icon:'🌨️', desc:'비/눈'};
  if (pty === '3') return {icon:'❄️',  desc:'눈'};
  if (pty === '4') return {icon:'🌦️', desc:'소나기'};
  if (sky === '1') return {icon:'☀️',  desc:'맑음'};
  if (sky === '3') return {icon:'⛅',  desc:'구름 많음'};
  if (sky === '4') return {icon:'☁️',  desc:'흐림'};
  return {icon:'🌤️', desc:'보통'};
}

// ─── 날짜/시간 유틸 ───────────────────────────────────────
function getBaseDateTime() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  // 초단기실황: 매 정시 발표, 10분 후 제공
  let h = now.getHours();
  let m = now.getMinutes();
  if (m < 10) h = h > 0 ? h-1 : 23;
  const date = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
  const time = `${pad(h)}00`;
  return {date, time};
}

function getFcstBaseDateTime() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  // 단기예보 발표: 0200,0500,0800,1100,1400,1700,2000,2300
  const hours = [2,5,8,11,14,17,20,23];
  let h = now.getHours();
  let base = hours.filter(x => x <= h).pop();
  if (base === undefined) { base = 23; now.setDate(now.getDate()-1); }
  const date = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
  return {date, time:`${pad(base)}00`};
}

// ─── 메인 날씨 조회 ───────────────────────────────────────
async function fetchWeather(nx, ny, cityName) {
  showLoading();
  try {
    const {date, time} = getBaseDateTime();
    const url = `${BASE_URL}/getUltraSrtNcst?serviceKey=${SERVICE_KEY}&numOfRows=10&pageNo=1&dataType=JSON&base_date=${date}&base_time=${time}&nx=${nx}&ny=${ny}`;
    const res = await fetch(url);
    const data = await res.json();

    if (data.response.header.resultCode !== '00') {
      throw new Error(data.response.header.resultMsg);
    }

    const items = data.response.body.items.item;
    const w = {};
    items.forEach(it => { w[it.category] = it.obsrValue; });

    const {icon, desc} = getSkyInfo(w.PTY || '0', '1');

    renderMain({
      cityName, icon, desc,
      temp:    w.T1H ?? '--',
      humid:   w.REH ?? '--',
      wind:    w.WSD ?? '--',
      precip:  w.RN1 === '강수없음' ? '없음' : (w.RN1 ?? '--'),
      pty:     w.PTY,
      updateTime: `${date.slice(4,6)}/${date.slice(6,8)} ${time.slice(0,2)}:${time.slice(2,4)} 기준`
    });

    await fetchForecast(nx, ny);

  } catch(e) {
    showError('날씨 정보를 불러오지 못했습니다.<br>잠시 후 다시 시도해주세요.');
    console.error(e);
  }
}

// ─── 단기예보 조회 ────────────────────────────────────────
async function fetchForecast(nx, ny) {
  try {
    const {date, time} = getFcstBaseDateTime();
    const url = `${BASE_URL}/getVilageFcst?serviceKey=${SERVICE_KEY}&numOfRows=60&pageNo=1&dataType=JSON&base_date=${date}&base_time=${time}&nx=${nx}&ny=${ny}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.response.header.resultCode !== '00') return;

    const items = data.response.body.items.item;
    // 시간별로 그룹핑
    const byTime = {};
    items.forEach(it => {
      const key = it.fcstDate + it.fcstTime;
      if (!byTime[key]) byTime[key] = {date:it.fcstDate, time:it.fcstTime};
      byTime[key][it.category] = it.fcstValue;
    });

    const slots = Object.values(byTime).slice(0, 8);
    renderForecast(slots);
  } catch(e) { console.error(e); }
}

// ─── 렌더링 ───────────────────────────────────────────────
function renderMain(w) {
  const card = document.getElementById('mainCard');
  card.innerHTML = `
    <div class="location-name">📍 ${w.cityName}</div>
    <div class="weather-hero">
      <div>
        <div class="temp-main">${w.temp}°</div>
        <div class="weather-desc">${w.icon} ${w.desc}</div>
        <div class="update-time">${w.updateTime} 업데이트</div>
      </div>
      <div class="weather-icon-big">${w.icon}</div>
    </div>
    <div class="detail-grid">
      <div class="detail-item">
        <div class="detail-icon">💧</div>
        <div class="detail-label">습도</div>
        <div class="detail-value">${w.humid}%</div>
      </div>
      <div class="detail-item">
        <div class="detail-icon">💨</div>
        <div class="detail-label">풍속</div>
        <div class="detail-value">${w.wind}<span style="font-size:0.7rem">m/s</span></div>
      </div>
      <div class="detail-item">
        <div class="detail-icon">🌧️</div>
        <div class="detail-label">강수량</div>
        <div class="detail-value" style="font-size:1rem">${w.precip}</div>
      </div>
    </div>
  `;
  card.classList.add('show');
  document.getElementById('introBox').style.display = 'none';
  document.getElementById('statusArea').innerHTML = '';
}

function renderForecast(slots) {
  const card = document.getElementById('forecastCard');
  const html = slots.map(s => {
    const h = s.time ? s.time.slice(0,2) : '--';
    const {icon, desc} = getSkyInfo(s.PTY||'0', s.SKY||'1');
    const temp = s.TMP ?? '--';
    const pop  = s.POP ?? '--';
    return `
      <div class="forecast-item">
        <div class="forecast-time">${h}시</div>
        <div class="forecast-icon">${icon}</div>
        <div class="forecast-desc">${desc}</div>
        <div class="forecast-temp">${temp}°</div>
        <div class="forecast-rain">☂ ${pop}%</div>
      </div>`;
  }).join('');
  card.innerHTML = `
    <div class="section-title">시간별 예보</div>
    <div class="forecast-list">${html}</div>
  `;
  card.classList.add('show');
}

// ─── UI 상태 ──────────────────────────────────────────────
function showLoading() {
  document.getElementById('mainCard').classList.remove('show');
  document.getElementById('forecastCard').classList.remove('show');
  document.getElementById('introBox').style.display = 'none';
  document.getElementById('statusArea').innerHTML = `
    <div class="status-box"><div class="spinner"></div><div style="color:var(--muted)">날씨 정보를 불러오는 중…</div></div>`;
}
function showError(msg) {
  document.getElementById('statusArea').innerHTML = `
    <div class="status-box"><div style="font-size:2rem;margin-bottom:12px">⚠️</div><div class="error-msg">${msg}</div></div>`;
}

// ─── 검색 ─────────────────────────────────────────────────
function searchWeather() {
  const input = document.getElementById('cityInput').value.trim();
  if (!input) return;

  // 도시명 매핑
  const found = Object.values(CITIES).find(c =>
    c.name === input || c.name.includes(input) || input.includes(c.name)
  );
  if (found) {
    fetchWeather(found.nx, found.ny, found.name);
  } else {
    showError(`"${input}" 지역을 찾을 수 없습니다.<br>서울, 부산, 전주, 제주 등 주요 도시명을 입력해주세요.`);
    document.getElementById('mainCard').classList.remove('show');
    document.getElementById('forecastCard').classList.remove('show');
  }
}

// Enter 키
document.getElementById('cityInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchWeather();
});

// ─── 현재 위치 ────────────────────────────────────────────
function getMyLocation() {
  if (!navigator.geolocation) { showError('위치 서비스를 지원하지 않는 브라우저입니다.'); return; }
  showLoading();
  navigator.geolocation.getCurrentPosition(pos => {
    const {latitude:lat, longitude:lng} = pos.coords;
    const {nx,ny} = latLonToGrid(lat,lng);
    fetchWeather(nx, ny, `위도 ${lat.toFixed(2)}, 경도 ${lng.toFixed(2)}`);
  }, () => showError('위치 정보를 가져올 수 없습니다.<br>브라우저 위치 권한을 허용해주세요.'));
}

// ─── 위경도 → 기상청 격자 변환 ───────────────────────────
function latLonToGrid(lat, lon) {
  const RE=6371.00877, GRID=5.0, SLAT1=30.0, SLAT2=60.0, OLON=126.0, OLAT=38.0, XO=43, YO=136;
  const DEGRAD=Math.PI/180;
  const re=RE/GRID, slat1=SLAT1*DEGRAD, slat2=SLAT2*DEGRAD, olon=OLON*DEGRAD, olat=OLAT*DEGRAD;
  let sn=Math.tan(Math.PI*0.25+slat2*0.5)/Math.tan(Math.PI*0.25+slat1*0.5);
  sn=Math.log(Math.cos(slat1)/Math.cos(slat2))/Math.log(sn);
  let sf=Math.tan(Math.PI*0.25+slat1*0.5); sf=Math.pow(sf,sn)*Math.cos(slat1)/sn;
  let ro=Math.tan(Math.PI*0.25+olat*0.5); ro=re*sf/Math.pow(ro,sn);
  let ra=Math.tan(Math.PI*0.25+lat*DEGRAD*0.5); ra=re*sf/Math.pow(ra,sn);
  let theta=lon*DEGRAD-olon; if(theta>Math.PI)theta-=2*Math.PI; if(theta<-Math.PI)theta+=2*Math.PI;
  theta*=sn;
  const nx=Math.floor(ra*Math.sin(theta)+XO+0.5);
  const ny=Math.floor(ro-ra*Math.cos(theta)+YO+0.5);
  return {nx,ny};
}
