<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>전국 날씨 조회 웹</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>

    body{
      transition: all 0.5s ease;
      background-size: 400% 400%;
    }

    /* fade-in */
    .fade-in{
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    /* 카드 hover */
    .card-hover{
      transition:all 0.3s ease;
    }

    .card-hover:hover{
      transform:
        translateY(-8px)
        scale(1.02);
    }

    /* 무지개 애니메이션 */
    .rainbow-mode{

      background:
        linear-gradient(
          -45deg,
          #ff0000,
          #ff8800,
          #ffee00,
          #00ff00,
          #00ffff,
          #0000ff,
          #8800ff,
          #ff0088
        );

      background-size: 400% 400%;

      animation:
        rainbowBG 10s ease infinite;

    }

    @keyframes rainbowBG{

      0%{
        background-position:0% 50%;
      }

      50%{
        background-position:100% 50%;
      }

      100%{
        background-position:0% 50%;
      }

    }

  </style>

</head>

<body class="bg-gradient-to-br from-sky-300 to-blue-500 min-h-screen text-black overflow-x-hidden">

  <div class="max-w-7xl mx-auto p-6">

    <!-- 상단 -->
    <div class="relative mb-10">

      <!-- 무지개 버튼 -->
      <button
        id="rainbowBtn"
        class="
          absolute
          left-0
          top-0
          z-50

          px-5
          py-2

          rounded-2xl

          text-white
          font-bold

          shadow-2xl

          hover:scale-110
          transition
          duration-300

          bg-gradient-to-r
          from-red-500
          via-yellow-400
          to-blue-500
        "
      >
        🌈 무지개모드
      </button>

      <!-- 다크모드 -->
      <button
        id="darkModeBtn"
        class="absolute right-0 top-0 bg-gray-800 text-white px-5 py-2 rounded-2xl shadow-lg hover:scale-105 transition z-50"
      >
        🌙 다크모드
      </button>

      <!-- 이름 -->
      <div class="absolute right-0 top-14 text-white font-bold text-lg">
        1314 정민재
      </div>

      <h1 class="text-5xl font-extrabold text-center drop-shadow-lg text-white">
        전국 날씨 조회 웹
      </h1>

      <!-- 현재 시간 -->
      <div
        id="clock"
        class="text-center mt-4 text-xl font-semibold text-white"
      >
        현재 시간 불러오는 중...
      </div>

    </div>

    <!-- 지역 버튼 -->
    <div
      id="regionButtons"
      class="flex flex-wrap gap-3 justify-center mb-8"
    ></div>

    <!-- 로딩 -->
    <div
      id="loading"
      class="text-center text-2xl mb-6 hidden animate-pulse font-bold text-white"
    >
      ☁️ 날씨 데이터를 불러오는 중...
    </div>

    <!-- 오류 -->
    <div
      id="errorBox"
      class="hidden bg-red-500 text-white p-4 rounded-2xl mb-6 whitespace-pre-line"
    ></div>

    <!-- 카드 -->
    <div
      id="weatherContainer"
      class="grid md:grid-cols-3 gap-6"
    ></div>

  </div>

  <script>

    // =========================================
    // 인증키
    // =========================================
    const SERVICE_KEY =
      encodeURIComponent(
        "403f80cb8c46202d2410f5590800a52b7cc12c01d5d7546e4f36f133c1a59448"
      );

    // =========================================
    // 지역 좌표
    // =========================================
    const regions = [

      { name: "서울", nx: 60, ny: 127 },
      { name: "부산", nx: 98, ny: 76 },
      { name: "대구", nx: 89, ny: 90 },
      { name: "인천", nx: 55, ny: 124 },
      { name: "광주", nx: 58, ny: 74 },
      { name: "대전", nx: 67, ny: 100 },
      { name: "울산", nx: 102, ny: 84 },
      { name: "세종", nx: 66, ny: 103 },
      { name: "경기", nx: 60, ny: 120 },
      { name: "강원", nx: 73, ny: 134 },
      { name: "충북", nx: 69, ny: 107 },
      { name: "충남", nx: 68, ny: 100 },
      { name: "전북", nx: 63, ny: 89 },
      { name: "전남", nx: 51, ny: 67 },
      { name: "경북", nx: 89, ny: 91 },
      { name: "경남", nx: 91, ny: 77 },
      { name: "제주", nx: 52, ny: 38 }

    ];

    // =========================================
    // 변수
    // =========================================
    let darkMode = false;
    let rainbowMode = false;
    let selectedRegion = "전국";
    let weatherData = [];

    const body = document.body;

    const weatherContainer =
      document.getElementById("weatherContainer");

    const regionButtons =
      document.getElementById("regionButtons");

    const loading =
      document.getElementById("loading");

    const errorBox =
      document.getElementById("errorBox");

    const darkModeBtn =
      document.getElementById("darkModeBtn");

    const rainbowBtn =
      document.getElementById("rainbowBtn");

    // =========================================
    // 현재 시간 표시
    // =========================================
    function updateClock(){

      const now = new Date();

      const timeString =
        now.toLocaleString("ko-KR", {

          year:"numeric",
          month:"long",
          day:"numeric",
          weekday:"long",
          hour:"2-digit",
          minute:"2-digit",
          second:"2-digit"

        });

      document.getElementById("clock")
        .innerText = timeString;

    }

    updateClock();
    setInterval(updateClock, 1000);

    // =========================================
    // 배경 적용
    // =========================================
    function applyBackground(){

      body.classList.remove(
        "rainbow-mode"
      );

      if(rainbowMode){

        body.className =
          "rainbow-mode min-h-screen text-white overflow-x-hidden";

      }

      else if(darkMode){

        body.className =
          "bg-gradient-to-br from-gray-900 to-black min-h-screen text-white overflow-x-hidden";

      }

      else{

        body.className =
          "bg-gradient-to-br from-sky-300 to-blue-500 min-h-screen text-black overflow-x-hidden";

      }

    }

    // =========================================
    // 다크모드
    // =========================================
    darkModeBtn.addEventListener("click", () => {

      darkMode = !darkMode;

      if(darkMode){

        darkModeBtn.innerText =
          "☀️ 라이트모드";

      }

      else{

        darkModeBtn.innerText =
          "🌙 다크모드";

      }

      applyBackground();

      createRegionButtons();
      renderWeather();

    });

    // =========================================
    // 무지개모드
    // =========================================
    rainbowBtn.addEventListener("click", () => {

      rainbowMode = !rainbowMode;

      if(rainbowMode){

        rainbowBtn.innerText =
          "🌈 무지개모드 ON";

        rainbowBtn.classList.add(
          "ring-4",
          "ring-white"
        );

      }

      else{

        rainbowBtn.innerText =
          "🌈 무지개모드";

        rainbowBtn.classList.remove(
          "ring-4",
          "ring-white"
        );

      }

      applyBackground();

    });

    // =========================================
    // 지역 버튼 생성
    // =========================================
    function createRegionButtons(){

      regionButtons.innerHTML = "";

      const allBtn =
        document.createElement("button");

      allBtn.innerText = "전국";

      allBtn.className = `
        px-4 py-2 rounded-xl shadow-lg transition
        ${
          selectedRegion === "전국"
            ? "bg-blue-500 text-white"
            : darkMode || rainbowMode
            ? "bg-gray-700 text-white"
            : "bg-white"
        }
      `;

      allBtn.onclick = () => {

        selectedRegion = "전국";

        createRegionButtons();
        renderWeather();

      };

      regionButtons.appendChild(allBtn);

      regions.forEach((region) => {

        const btn =
          document.createElement("button");

        btn.innerText = region.name;

        btn.className = `
          px-4 py-2 rounded-xl shadow-lg transition hover:scale-105
          ${
            selectedRegion === region.name
              ? "bg-blue-500 text-white"
              : darkMode || rainbowMode
              ? "bg-gray-700 text-white"
              : "bg-white"
          }
        `;

        btn.onclick = () => {

          selectedRegion = region.name;

          createRegionButtons();
          renderWeather();

        };

        regionButtons.appendChild(btn);

      });

    }

    // =========================================
    // 발표 시간 계산
    // =========================================
    function getBaseDateTime(){

      const now = new Date();

      let baseDate = new Date(now);

      const hour = now.getHours();

      let baseTime = "2300";

      if(hour < 2){

        baseTime = "2300";

        baseDate.setDate(
          baseDate.getDate() - 1
        );

      }

      else if(hour < 5)
        baseTime = "0200";

      else if(hour < 8)
        baseTime = "0500";

      else if(hour < 11)
        baseTime = "0800";

      else if(hour < 14)
        baseTime = "1100";

      else if(hour < 17)
        baseTime = "1400";

      else if(hour < 20)
        baseTime = "1700";

      else if(hour < 23)
        baseTime = "2000";

      else
        baseTime = "2300";

      const year =
        baseDate.getFullYear();

      const month =
        String(baseDate.getMonth() + 1)
        .padStart(2, "0");

      const day =
        String(baseDate.getDate())
        .padStart(2, "0");

      return {

        baseDate:
          `${year}${month}${day}`,

        baseTime

      };

    }

    // =========================================
    // 날씨 가져오기
    // =========================================
    async function fetchWeather(){

      loading.classList.remove("hidden");

      try{

        const allData = [];

        const {
          baseDate,
          baseTime
        } = getBaseDateTime();

        for(const region of regions){

          const url =
            `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst?serviceKey=${SERVICE_KEY}&pageNo=1&numOfRows=500&dataType=JSON&base_date=${baseDate}&base_time=${baseTime}&nx=${region.nx}&ny=${region.ny}`;

          const response =
            await fetch(url);

          const text =
            await response.text();

          const data =
            JSON.parse(text);

          const items =
            data.response.body.items.item;

          let temp = "-";
          let humidity = "-";
          let rain = "-";
          let wind = "-";
          let sky = "맑음";

          const firstTime =
            items[0].fcstTime;

          items.forEach((item) => {

            if(
              item.fcstTime !== firstTime
            ) return;

            if(item.category === "TMP")
              temp = item.fcstValue;

            if(item.category === "REH")
              humidity = item.fcstValue;

            if(item.category === "POP")
              rain = item.fcstValue;

            if(item.category === "WSD")
              wind = item.fcstValue;

            if(item.category === "SKY"){

              if(item.fcstValue == 1)
                sky = "맑음";

              else if(item.fcstValue == 3)
                sky = "구름많음";

              else if(item.fcstValue == 4)
                sky = "흐림";

            }

          });

          allData.push({

            region: region.name,

            weather: {
              temp,
              humidity,
              rain,
              wind,
              sky
            }

          });

        }

        weatherData = allData;

        renderWeather();

      }

      catch(error){

        console.error(error);

        errorBox.classList.remove("hidden");

        errorBox.innerText =
          "데이터를 불러오는 중 오류 발생";

      }

      loading.classList.add("hidden");

    }

    // =========================================
    // 카드 출력
    // =========================================
    function renderWeather(){

      weatherContainer.innerHTML = "";

      const filteredData =
        selectedRegion === "전국"
          ? weatherData
          : weatherData.filter(
              item =>
                item.region === selectedRegion
            );

      filteredData.forEach((item) => {

        let weatherEmoji = "☀️";

        if(item.weather.sky === "맑음")
          weatherEmoji = "☀️";

        else if(item.weather.sky === "구름많음")
          weatherEmoji = "⛅";

        else if(item.weather.sky === "흐림")
          weatherEmoji = "☁️";

        const card =
          document.createElement("div");

        card.className = `
          fade-in card-hover
          rounded-3xl p-6 shadow-2xl
          backdrop-blur-md border border-white/20
          ${
            darkMode || rainbowMode
              ? "bg-gray-800/80 text-white"
              : "bg-white/70"
          }
        `;

        card.innerHTML = `

          <h2 class="text-3xl font-bold mb-5 text-center">
            ${item.region}
          </h2>

          <div class="space-y-3 text-lg">

            <p>
              🌡️ 기온 :
              ${item.weather.temp}℃
            </p>

            <p>
              💧 습도 :
              ${item.weather.humidity}%
            </p>

            <p>
              🌧️ 강수확률 :
              ${item.weather.rain}%
            </p>

            <p>
              💨 풍속 :
              ${item.weather.wind} m/s
            </p>

            <p>
              😷 미세먼지 :
              보통
            </p>

            <p class="text-2xl font-bold text-center mt-5">
              ${weatherEmoji}
              ${item.weather.sky}
            </p>

          </div>

        `;

        weatherContainer.appendChild(card);

      });

    }

    // =========================================
    // 실행
    // =========================================
    applyBackground();
    createRegionButtons();
    fetchWeather();

  </script>

</body>
</html>
