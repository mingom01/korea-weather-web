<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>전국 날씨 조회 웹</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      transition: all 0.3s;
    }
  </style>
</head>

<body class="bg-sky-100 text-black">

  <div class="max-w-7xl mx-auto p-6">

    <!-- 제목 -->
    <div class="flex justify-between items-center mb-8">

      <h1 class="text-4xl font-bold">
        전국 날씨 조회 웹
      </h1>

      <button
        id="darkModeBtn"
        class="bg-gray-800 text-white px-5 py-2 rounded-2xl shadow-lg"
      >
        🌙 다크모드
      </button>

    </div>

    <!-- 지역 버튼 -->
    <div
      id="regionButtons"
      class="flex flex-wrap gap-3 justify-center mb-8"
    ></div>

    <!-- 로딩 -->
    <div
      id="loading"
      class="text-center text-2xl mb-6 hidden"
    >
      날씨 데이터를 불러오는 중...
    </div>

    <!-- 오류 -->
    <div
      id="errorBox"
      class="hidden bg-red-500 text-white p-4 rounded-2xl mb-6 whitespace-pre-line"
    ></div>

    <!-- 카드 -->
    <div
      id="weatherContainer"
      class="grid md:grid-cols-3 gap-6"
    ></div>

  </div>

  <script>

    // =========================================
    // 인증키
    // =========================================
    const SERVICE_KEY =
      encodeURIComponent(
        "403f80cb8c46202d2410f5590800a52b7cc12c01d5d7546e4f36f133c1a59448"
      );

    // =========================================
    // 지역 좌표
    // =========================================
    const regions = [

      { name: "서울", nx: 60, ny: 127 },
      { name: "부산", nx: 98, ny: 76 },
      { name: "대구", nx: 89, ny: 90 },
      { name: "인천", nx: 55, ny: 124 },
      { name: "광주", nx: 58, ny: 74 },
      { name: "대전", nx: 67, ny: 100 },
      { name: "울산", nx: 102, ny: 84 },
      { name: "세종", nx: 66, ny: 103 },
      { name: "경기", nx: 60, ny: 120 },
      { name: "강원", nx: 73, ny: 134 },
      { name: "충북", nx: 69, ny: 107 },
      { name: "충남", nx: 68, ny: 100 },
      { name: "전북", nx: 63, ny: 89 },
      { name: "전남", nx: 51, ny: 67 },
      { name: "경북", nx: 89, ny: 91 },
      { name: "경남", nx: 91, ny: 77 },
      { name: "제주", nx: 52, ny: 38 }

    ];

    // =========================================
    // 변수
    // =========================================
    let darkMode = false;
    let selectedRegion = "전국";
    let weatherData = [];

    const body =
      document.body;

    const weatherContainer =
      document.getElementById("weatherContainer");

    const regionButtons =
      document.getElementById("regionButtons");

    const loading =
      document.getElementById("loading");

    const errorBox =
      document.getElementById("errorBox");

    const darkModeBtn =
      document.getElementById("darkModeBtn");

    // =========================================
    // 다크모드
    // =========================================
    darkModeBtn.addEventListener("click", () => {

      darkMode = !darkMode;

      if (darkMode) {

        body.className =
          "bg-gray-900 text-white";

        darkModeBtn.innerText =
          "☀️ 라이트모드";

      }
      else {

        body.className =
          "bg-sky-100 text-black";

        darkModeBtn.innerText =
          "🌙 다크모드";

      }

      createRegionButtons();
      renderWeather();

    });

    // =========================================
    // 버튼 생성
    // =========================================
    function createRegionButtons() {

      regionButtons.innerHTML = "";

      // 전국 버튼
      const allBtn =
        document.createElement("button");

      allBtn.innerText = "전국";

      allBtn.className = `
        px-4 py-2 rounded-xl shadow
        ${
          selectedRegion === "전국"
            ? "bg-blue-500 text-white"
            : darkMode
            ? "bg-gray-700"
            : "bg-white"
        }
      `;

      allBtn.onclick = () => {

        selectedRegion = "전국";

        createRegionButtons();
        renderWeather();

      };

      regionButtons.appendChild(allBtn);

      // 지역 버튼
      regions.forEach((region) => {

        const btn =
          document.createElement("button");

        btn.innerText =
          region.name;

        btn.className = `
          px-4 py-2 rounded-xl shadow
          ${
            selectedRegion === region.name
              ? "bg-blue-500 text-white"
              : darkMode
              ? "bg-gray-700"
              : "bg-white"
          }
        `;

        btn.onclick = () => {

          selectedRegion =
            region.name;

          createRegionButtons();
          renderWeather();

        };

        regionButtons.appendChild(btn);

      });

    }

    // =========================================
    // 기상청 발표 시간 계산
    // =========================================
    function getBaseDateTime() {

      const now =
        new Date();

      let baseDate =
        new Date(now);

      const hour =
        now.getHours();

      let baseTime =
        "2300";

      if (hour < 2) {

        baseTime = "2300";

        // 하루 감소
        baseDate.setDate(
          baseDate.getDate() - 1
        );

      }
      else if (hour < 5)
        baseTime = "0200";

      else if (hour < 8)
        baseTime = "0500";

      else if (hour < 11)
        baseTime = "0800";

      else if (hour < 14)
        baseTime = "1100";

      else if (hour < 17)
        baseTime = "1400";

      else if (hour < 20)
        baseTime = "1700";

      else if (hour < 23)
        baseTime = "2000";

      else
        baseTime = "2300";

      const year =
        baseDate.getFullYear();

      const month =
        String(baseDate.getMonth() + 1)
        .padStart(2, "0");

      const day =
        String(baseDate.getDate())
        .padStart(2, "0");

      return {

        baseDate:
          `${year}${month}${day}`,

        baseTime

      };

    }

    // =========================================
    // 날씨 가져오기
    // =========================================
    async function fetchWeather() {

      loading.classList.remove("hidden");

      errorBox.classList.add("hidden");

      try {

        const allData = [];

        const {
          baseDate,
          baseTime
        } = getBaseDateTime();

        console.log(
          "baseDate:",
          baseDate,
          "baseTime:",
          baseTime
        );

        for (const region of regions) {

          const url =
            `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst?serviceKey=${SERVICE_KEY}&pageNo=1&numOfRows=500&dataType=JSON&base_date=${baseDate}&base_time=${baseTime}&nx=${region.nx}&ny=${region.ny}`;

          console.log(url);

          const response =
            await fetch(url);

          const text =
            await response.text();

          console.log(region.name, text);

          // XML 에러 감지
          if (
            text.includes("OpenAPI_ServiceResponse")
          ) {

            errorBox.classList.remove("hidden");

            errorBox.innerText =
              "기상청 API 인증 오류\n\nEncoding 키 또는 API 활용승인을 확인하세요.";

            continue;

          }

          const data =
            JSON.parse(text);

          // API 오류
          if (
            data.response.header.resultCode !== "00"
          ) {

            errorBox.classList.remove("hidden");

            errorBox.innerText =
              data.response.header.resultMsg;

            continue;

          }

          const items =
            data.response.body.items.item;

          let temp = "-";
          let humidity = "-";
          let rain = "-";
          let wind = "-";
          let sky = "맑음";

          // 첫 예보 시간
          const firstTime =
            items[0].fcstTime;

          items.forEach((item) => {

            if (
              item.fcstTime !== firstTime
            ) return;

            // 기온
            if (item.category === "TMP")
              temp = item.fcstValue;

            // 습도
            if (item.category === "REH")
              humidity = item.fcstValue;

            // 강수확률
            if (item.category === "POP")
              rain = item.fcstValue;

            // 풍속
            if (item.category === "WSD")
              wind = item.fcstValue;

            // 하늘상태
            if (item.category === "SKY") {

              if (item.fcstValue == 1)
                sky = "맑음";

              else if (item.fcstValue == 3)
                sky = "구름많음";

              else if (item.fcstValue == 4)
                sky = "흐림";

            }

          });

          allData.push({

            region: region.name,

            weather: {
              temp,
              humidity,
              rain,
              wind,
              sky
            }

          });

        }

        weatherData = allData;

        renderWeather();

      }
      catch (error) {

        console.error(error);

        errorBox.classList.remove("hidden");

        errorBox.innerText =
          "데이터를 불러오는 중 오류가 발생했습니다.\n\nF12 → Console에서 오류를 확인하세요.";

      }

      loading.classList.add("hidden");

    }

    // =========================================
    // 카드 출력
    // =========================================
    function renderWeather() {

      weatherContainer.innerHTML = "";

      const filteredData =
        selectedRegion === "전국"
          ? weatherData
          : weatherData.filter(
              item =>
                item.region === selectedRegion
            );

      filteredData.forEach((item) => {

        const card =
          document.createElement("div");

        card.className = `
          rounded-2xl p-5 shadow-xl
          ${
            darkMode
              ? "bg-gray-800"
              : "bg-white"
          }
        `;

        card.innerHTML = `

          <h2 class="text-2xl font-bold mb-4">
            ${item.region}
          </h2>

          <div class="space-y-3 text-lg">

            <p>
              🌡️ 기온 :
              ${item.weather.temp}℃
            </p>

            <p>
              💧 습도 :
              ${item.weather.humidity}%
            </p>

            <p>
              🌧️ 강수확률 :
              ${item.weather.rain}%
            </p>

            <p>
              💨 풍속 :
              ${item.weather.wind} m/s
            </p>

            <p>
              ☀️ 날씨 :
              ${item.weather.sky}
            </p>

          </div>

        `;

        weatherContainer.appendChild(card);

      });

    }

    // =========================================
    // 실행
    // =========================================
    createRegionButtons();
    fetchWeather();

  </script>

</body>
</html>
